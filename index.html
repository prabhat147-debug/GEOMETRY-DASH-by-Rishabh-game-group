<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geo-Dash Evolution</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #00f2ff; font-size: 30px; font-weight: bold; text-shadow: 2px 2px #000;
        }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95); padding: 40px; border-radius: 15px;
            border: 4px solid #ff0055; text-align: center; color: white; display: none;
        }
        #dev-name { color: #00f2ff; font-size: 24px; margin: 15px 0; display: block; }
        button {
            background: #ff0055; color: white; border: none; padding: 15px 40px;
            font-size: 20px; cursor: pointer; border-radius: 8px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="scoreText">0</span></div>

    <div id="game-over">
        <h1 style="color:#ff0055; margin:0;">CRASHED!</h1>
        <p style="font-size: 20px;">Score: <span id="finalScore">0</span></p>
        <hr style="border: 0.5px solid #333;">
        <p>Developed by:</p>
        <span id="dev-name">Rishabh Gupta</span>
        <button onclick="resetGame()">PLAY AGAIN</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Game Variables
    let gameActive = true;
    let score = 0;
    let gameSpeed = 7; 
    let spawnRate = 1500; // Starting spawn delay in ms
    let lastSpawn = 0;
    const gravity = 0.8;

    const player = {
        x: 100, y: 0, size: 45, dy: 0,
        jumpForce: -15, grounded: false, rotation: 0
    };

    let obstacles = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    // Controls
    function jump() {
        if (player.grounded && gameActive) {
            player.dy = player.jumpForce;
            player.grounded = false;
        }
    }
    window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });
    window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, {passive: false});

    function createObstacle() {
        // Randomly choose between single, double, or small spikes
        const type = Math.random();
        let count = 1;
        if (score > 10 && type > 0.7) count = 2; // Double spikes after 10 points
        if (score > 25 && type > 0.9) count = 3; // Triple spikes after 25 points

        obstacles.push({
            x: canvas.width,
            y: canvas.height - 100,
            width: 35,
            height: 45,
            count: count
        });

        // DRAMATIC CHANGE: The higher the score, the faster the next one spawns
        let nextSpawn = Math.max(600, spawnRate - (score * 25));
        lastSpawn = setTimeout(createObstacle, nextSpawn + Math.random() * 500);
    }

    function resetGame() {
        score = 0;
        gameSpeed = 7;
        spawnRate = 1500;
        obstacles = [];
        gameActive = true;
        player.dy = 0;
        document.getElementById('scoreText').innerText = "0";
        document.getElementById('game-over').style.display = 'none';
        clearTimeout(lastSpawn);
        createObstacle();
        update();
    }

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Ground
        ctx.fillStyle = '#111';
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);
        ctx.strokeStyle = '#ff0055';
        ctx.lineWidth = 5;
        ctx.strokeRect(0, canvas.height - 100, canvas.width, 2);

        // Player Physics
        player.dy += gravity;
        player.y += player.dy;

        if (player.y + player.size > canvas.height - 100) {
            player.y = canvas.height - 100 - player.size;
            player.dy = 0;
            player.grounded = true;
            player.rotation = Math.round(player.rotation / 90) * 90;
        } else {
            player.rotation += (gameSpeed * 0.8); // Spin speed relative to game speed
            player.grounded = false;
        }

        // Draw Player
        ctx.save();
        ctx.translate(player.x + player.size/2, player.y + player.size/2);
        ctx.rotate(player.rotation * Math.PI / 180);
        ctx.fillStyle = '#00f2ff';
        ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
        ctx.strokeStyle = '#fff';
        ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
        ctx.restore();
