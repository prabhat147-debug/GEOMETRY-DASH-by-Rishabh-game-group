<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Geometry Dash: Hardcore Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; user-select: none; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 32px; font-weight: 900; letter-spacing: 2px;
            text-shadow: 0 0 10px #00f2ff; pointer-events: none;
        }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 10, 0.95); padding: 50px; border-radius: 5px;
            border: 2px solid #00f2ff; text-align: center; color: white; display: none;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.3);
        }
        .dev-text { color: #00f2ff; font-size: 26px; font-weight: bold; display: block; margin: 15px 0; }
        button {
            background: #fff; color: #000; border: none; padding: 15px 40px;
            font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #00f2ff; }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="scoreText">0</span></div>

    <div id="game-over">
        <h1 style="letter-spacing: 5px; margin: 0;">GAME OVER</h1>
        <p style="font-size: 20px; opacity: 0.8;">Score: <span id="finalScore">0</span></p>
        <p style="margin-top: 30px; font-size: 14px; text-transform: uppercase; opacity: 0.6;">Developed by</p>
        <span class="dev-text">Rishabh Gupta</span>
        <button onclick="resetGame()">RESTART</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let gameActive = true;
    let score = 0;
    let gameSpeed = 8; 
    const gravity = 0.9;
    const groundHeight = 100;

    const player = {
        x: 120, y: 0, size: 40, dy: 0,
        jumpForce: -16, grounded: false, rotation: 0
    };

    let obstacles = [];
    let nextSpawnTime = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function jump() {
        if (player.grounded && gameActive) {
            player.dy = player.jumpForce;
            player.grounded = false;
        }
    }

    window.addEventListener('keydown', (e) => { if(e.code === 'Space' || e.code === 'ArrowUp') jump(); });
    window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, {passive: false});
    window.addEventListener('mousedown', jump);

    function spawnEngine() {
        if (!gameActive) return;

        let typeIndex = Math.random();
        let count = 1;

        // DIFFICULTY LOGIC: If score > 4, start spawning "Harder" obstacles
        if (score > 4) {
            if (typeIndex > 0.4) count = 3; // 3 spikes
            if (typeIndex > 0.7) count = 4; // 4 spikes
            if (typeIndex > 0.9) count = 5; // The "Impossible" 5-spike chain
        } else if (score > 2) {
            if (typeIndex > 0.6) count = 2;
        }

        obstacles.push({
            x: canvas.width,
            y: canvas.height - groundHeight,
            w: 30, // width per spike
            h: 40, // height
            count: count
        });

        // The more speed/score, the faster the next one spawns
        let baseDelay = 1600;
        let difficultyAdjustment = Math.min(1000, (score * 80) + (gameSpeed * 10));
        let finalDelay = Math.max(500, baseDelay - difficultyAdjustment);

        setTimeout(spawnEngine, finalDelay + Math.random() * 400);
    }

    function resetGame() {
        score = 0;
        gameSpeed = 8;
        obstacles = [];
        gameActive = true;
        player.dy = 0;
        document.getElementById('scoreText').innerText = "0";
        document.getElementById('game-over').style.display = 'none';
        spawnEngine();
        update();
    }

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Dark Background
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Draw Ground with Neon Glow
        ctx.fillStyle = '#111';
        ctx.fillRect(0, canvas.height - groundHeight, canvas.width, groundHeight);
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#00f2ff';
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 4;
        ctx.strokeRect(-5, canvas.height - groundHeight, canvas.width + 10, 2);
        ctx.shadowBlur = 0;

        // Player Physics
        player.dy += gravity;
        player.y += player.dy;

        if (player.y + player.size > canvas.height - groundHeight) {
            player.y = canvas.height - groundHeight - player.size;
            player.dy = 0;
            player.grounded = true;
            player.rotation = Math.round(player.rotation / 90) * 90;
        } else {
            player.rotation += (gameSpeed * 1.2); 
            player.grounded = false;
        }

        // Draw Player
        ctx.save();
        ctx.translate(player.x + player.size/2, player.y + player.size/2);
        ctx.rotate(player.rotation * Math.PI / 180);
        ctx.fillStyle = '#fff';
        ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 3;
        ctx.strokeRect(-player.size/2, -player.size/2, player.size, player.size);
        ctx.restore();

        // Handle Obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= gameSpeed;

            // Draw Spike Chains
            ctx.fillStyle = '#ff3333';
            for(let n = 0; n < o.count; n++) {
                let ox = o.x + (n * o.w);
                ctx.beginPath();
                ctx.moveTo(ox, o.y);
                ctx.lineTo(ox + o.w, o.y);
                ctx.lineTo(ox + (o.w / 2), o.y - o.h);
                ctx.fill();
            }

            // Hitbox Logic (Tightened for fairness)
            if (player.x + player.size - 8 > o.x && 
                player.x + 8 < o.x + (o.w * o.count) && 
                player.y + player.size - 5 > o.y - o.h) {
                
                gameActive = false;
                document.getElementById('finalScore').innerText = score;
                document.getElementById('game-over').style.display = 'block';
            }

            // Score and Difficulty Ramp
            if (o.x + (o.w * o.count) < 0) {
                obstacles.splice(i
